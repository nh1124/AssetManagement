services:
  db:
    image: postgres:16-alpine
    container_name: finance-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_ide
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: finance-backend
    ports:
      - "${BACKEND_PORT:-18100}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/finance_ide
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: finance-frontend
    ports:
      - "${FRONTEND_PORT:-15173}:80"
    depends_on:
      - backend
    restart: unless-stopped

  mcp:
    build:
      context: ./mcp
    container_name: finance-mcp
    ports:
      - "${MCP_PORT:-13000}:3000"
    environment:
      - PORT=3000
      - BASE_URL=${MCP_BASE_URL:-http://localhost:13000}
      - MCP_PASSWORD=${MCP_PASSWORD:-change-me}
      - JWT_SECRET=${MCP_JWT_SECRET:-change-me-to-a-secret-key-at-least-32-chars}
      - BACKEND_URL=http://backend:8000
      - BACKEND_USERNAME=${BACKEND_USERNAME:-}
      - BACKEND_PASSWORD=${BACKEND_PASSWORD:-}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
